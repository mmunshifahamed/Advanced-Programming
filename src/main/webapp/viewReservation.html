<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>View Reservation</title>
</head>
<body>

<div class="container fade-in">

    <div class="topbar">
        <div class="left">
            <div class="logo-badge">HR</div>
            <div>
                <h2>View Reservation</h2>
                <p class="muted">Search reservation by number</p>
            </div>
        </div>

        <a class="btn" href="dashboard.html">⬅ Dashboard</a>
    </div>

    <div class="card">

        <div class="row">

            <input type="text" id="rno" placeholder="R0001" maxlength="5">

            <button class="btn primary" onclick="searchRes()">
                🔍 Search
            </button>

        </div>

        <div class="spacer"></div>

        <pre id="result"></pre>

        <div id="msg" class="toast"></div>

    </div>

</div>

<script>

    const msg = document.getElementById("msg");
    const rnoInput = document.getElementById("rno");

    /* Reservation Number Auto Formatter */

    rnoInput.addEventListener("input", function(){

        let value = this.value.replace(/[^0-9]/g,"");

        if(value.length > 4){
            value = value.slice(0,4);
        }

        value = value.padStart(4,'0');

        this.value = "R" + value;

    });

    function showMsg(text,type){
        msg.className = "toast show " + (type || "");
        msg.textContent = text;

        setTimeout(()=>{
            msg.className="toast";
        },3000);
    }

    async function searchRes(){

        const rno = rnoInput.value.trim();

        if(!rno){
            showMsg("❌ Please enter reservation number","error");
            return;
        }

        try{

            const res = await fetch("view-reservation?reservationNo=" + encodeURIComponent(rno));
            const text = await res.text();

            document.getElementById("result").innerText = text;

            if(text.includes("Reservation Found")){
                showMsg("✅ Reservation loaded","success");
            }else{
                showMsg("⚠️ Reservation not found","warn");
            }

        }catch(e){
            showMsg("❌ Network error","error");
        }

    }

</script>

</body>
</html>
