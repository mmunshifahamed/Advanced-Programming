<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Calculate Bill</title>
</head>
<body>

<div class="container fade-in">

    <div class="topbar">
        <div class="left">
            <div class="logo-badge">HR</div>
            <div>
                <h2>Generate Bill</h2>
                <p class="muted">Calculate hotel reservation bill</p>
            </div>
        </div>

        <a class="btn" href="dashboard.html">⬅ Dashboard</a>
    </div>

    <div class="card">

        <div class="row">
            <input type="text" id="rno" placeholder="Enter Reservation Number">
            <button class="btn primary" onclick="getBill()">🧾 Generate Bill</button>
        </div>

        <div class="spacer"></div>

        <pre id="billBox"></pre>

        <div class="spacer"></div>

        <button class="btn" onclick="window.print()">🖨 Print Bill</button>

        <div id="msg" class="toast"></div>

    </div>

</div>

<script>

    const msg = document.getElementById("msg");

    function showMsg(text,type){
        msg.className = "toast show " + (type || "");
        msg.textContent = text;

        setTimeout(()=>{
            msg.className="toast";
        },3000);
    }

    async function getBill(){

        const rno = document.getElementById("rno").value.trim();

        if(!rno){
            showMsg("❌ Enter reservation number","error");
            return;
        }

        try{

            const res = await fetch("bill?reservationNo=" + encodeURIComponent(rno));
            const text = await res.text();

            document.getElementById("billBox").innerText = text;

            if(text.includes("TOTAL")){
                showMsg("✅ Bill generated successfully","success");
            }else{
                showMsg("⚠️ Reservation not found","warn");
            }

        }catch(e){
            showMsg("❌ Failed to generate bill","error");
        }

    }

</script>

</body>
</html>
