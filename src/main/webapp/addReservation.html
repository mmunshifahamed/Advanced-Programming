<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Add Reservation</title>
</head>
<body>

<div class="container fade-in">

    <div class="topbar">
        <div class="left">
            <div class="logo-badge">HR</div>
            <div>
                <h2>Add Reservation</h2>
                <p class="muted">Create a new guest reservation</p>
            </div>
        </div>

        <a class="btn" href="dashboard.html">⬅ Dashboard</a>
    </div>

    <div class="card">

        <form id="resForm" class="form">

            <div class="field">
                <label>Reservation Number</label>
                <input type="text" id="rno" placeholder="Enter reservation number" required>
            </div>

            <div class="field">
                <label>Guest Name</label>
                <input type="text" id="name" placeholder="Enter guest name" required>
            </div>

            <div class="field">
                <label>Address</label>
                <input type="text" id="address" placeholder="Enter address" required>
            </div>

            <div class="field">
                <label>Contact Number</label>
                <input type="text" id="contact" placeholder="0771234567" required>
            </div>

            <div class="field">
                <label>Room Type</label>
                <select id="roomType" required>
                    <option value="">Select Room Type</option>
                    <option>Single</option>
                    <option>Double</option>
                    <option>Deluxe</option>
                    <option>Suite</option>
                </select>
            </div>

            <div class="row">
                <div class="field" style="flex:1;">
                    <label>Check-in Date</label>
                    <input type="date" id="checkIn" required>
                </div>

                <div class="field" style="flex:1;">
                    <label>Check-out Date</label>
                    <input type="date" id="checkOut" required>
                </div>
            </div>

            <button class="btn primary" type="submit" id="saveBtn">
                <span class="btn-text">Save Reservation</span>
                <span class="spinner" id="spinner"></span>
            </button>

        </form>

        <div id="msg" class="toast"></div>

    </div>

</div>

<script>

    const form = document.getElementById("resForm");
    const msg = document.getElementById("msg");
    const spinner = document.getElementById("spinner");
    const btn = document.getElementById("saveBtn");
    const rnoInput = document.getElementById("rno");

    function showMsg(text,type){
        msg.className = "toast show " + (type || "");
        msg.textContent = text;

        setTimeout(()=>{
            msg.className="toast";
        },3000);
    }

    function setLoading(v){
        spinner.style.display = v ? "inline-block":"none";
        btn.disabled = v;
    }

    /* AUTO FORMAT RESERVATION NUMBER */

    rnoInput.addEventListener("blur",function(){

        let num = rnoInput.value.replace(/\D/g,'');

        if(num==="") return;

        num = num.padStart(4,'0');

        rnoInput.value = "R" + num;

    });


    form.addEventListener("submit", async function(e){
        e.preventDefault();

        const data = new URLSearchParams();

        data.append("reservationNo", rnoInput.value.trim());
        data.append("guestName", document.getElementById("name").value.trim());
        data.append("address", document.getElementById("address").value.trim());
        data.append("contact", document.getElementById("contact").value.trim());
        data.append("roomType", document.getElementById("roomType").value);
        data.append("checkIn", document.getElementById("checkIn").value);
        data.append("checkOut", document.getElementById("checkOut").value);

        setLoading(true);

        try{

            const res = await fetch("add-reservation",{
                method:"POST",
                headers:{"Content-Type":"application/x-www-form-urlencoded"},
                body:data.toString()
            });

            const text = await res.text();

            if(text.includes("exists")){
                showMsg("❌ This reservation number already exists","error");
            }
            else if(text.includes("Saved")){
                showMsg("✅ Reservation saved successfully","success");
                form.reset();
            }
            else{
                showMsg(text,"error");
            }

        }catch(err){
            showMsg("❌ Network error","error");
        }

        setLoading(false);

    });

</script>

</body>
</html>
